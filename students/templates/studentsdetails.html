<!doctype html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Students Details</title>
  </head>
  <link rel="stylesheet" href="{% static 'style.css' %}" />
  <body class="details">
    <h1>Students Details</h1>
    <div class="profile-card">
      <h2>{{student.firstname}} {{student.lastname}}</h2>
      <p><span class="detail">Email: {{student.email}}</span></p>
      <p><span class="detail">Age: {{student.age}}</span></p>
      <p><span class="detail">Gender: {{student.gender}}</span></p>
      <p><span class="detail">Department:{{student.department}}</span></p>

      <a href="{%url 'studentslist'%}" class="Detail">Back To The List</a>
    </div>
  </body>
</html>
